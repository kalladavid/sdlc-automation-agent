name: SDLC Automation Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"

jobs:
  analyze-and-test:
    name: Code Analysis & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest aws-cdk-lib constructs

      - name: Run unit tests
        run: |
          pytest tests/ -v

      - name: Run SDLC Orchestrator
        run: |
          python orchestrator.py

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: |
            reports/
            *.json
          if-no-files-found: ignore

  # ✅ Optional — enable when ready for auto deploy
  deploy-infra:
    name: Deploy CDK (Optional)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install aws-cdk-lib constructs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Bootstrap (safe if already done)
        working-directory: infrastructure
        run: |
          npx cdk bootstrap

      - name: CDK Deploy
        working-directory: infrastructure
        run: |
          npx cdk deploy --require-approval never
